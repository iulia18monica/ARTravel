{% load static %}
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <title>{% block title %}ARTravel{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main_style.css' %}">
    
    <style>
        * {
            font-family: 'Quicksand', sans-serif;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000033 0%, #4d0000 100%);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        /* --- NAVBAR MODIFICAT: Gradient Verde-Albastru Translucid --- */
        .main-header {
            background: linear-gradient(to right, rgba(50, 205, 50, 0.75), rgba(0, 191, 255, 0.75));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 5%;
        }

        /* Text ALB pentru link-uri */
        .nav-left a, .nav-right a, .nav-right span {
            color: white !important; 
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .nav-left a:hover, .nav-right a:hover {
            color: #ffe600 !important; /* Galben la hover */
            transform: scale(1.05);
        }

        /* Stil Buton Logout */
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: white;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: white;
            color: #000033;
        }

        /* Stil Buton Login */
        .login-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: white !important;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: white; 
            color: #000033 !important;
            transform: translateY(-2px);
        }

        .content-wrapper {
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <nav class="navbar-container">
            <div class="nav-left">
                <a href="{% url 'instructions' %}" style="font-size: 26px; font-weight: 700; font-style: italic;">ARTravel</a> 
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'about' %}">About</a>
                <a href="{% url 'attractions' %}">Attractions</a> 
                <a href="{% url 'journey' %}">Journey</a>
                <a href="{% url 'reviews' %}">Reviews</a>
            </div>

            <div class="nav-right">
                {% if user.is_authenticated %}
                    <a href="{% url 'routes' %}" title="Rutele mele salvate" style="margin-right: 15px; font-size: 1.2rem;">🗺️</a>
                    
                    <a href="{% url 'favorite_list' %}" class="heart-nav-btn" title="Favoritele mele">❤️</a>
                    
                    <span style="margin-left: 10px; margin-right: 15px;">{{ user.username }}</span>
                    
                    <form action="{% url 'logout' %}" method="post" style="display: inline; margin: 0;">
                        {% csrf_token %}
                        <button type="submit" class="logout-btn">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="login-btn">Login</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <main class="content-wrapper">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
